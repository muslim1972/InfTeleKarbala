<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عرض الصورة</title>
  <style>
    body { 
      margin: 0; 
      background: #0f172a; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      overflow: hidden; 
      font-family: system-ui, -apple-system, sans-serif;
    }
    img { 
      max-width: 90%; 
      max-height: 90vh; 
      object-fit: contain; 
      border-radius: 8px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }
    .close-btn { 
      position: absolute; 
      top: 24px; 
      right: 24px; /* RTL layout */
      background: rgba(15, 23, 42, 0.8); 
      color: white; 
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 16px;
      font-weight: bold;
      padding: 12px 24px;
      border-radius: 9999px; 
      cursor: pointer; 
      display: flex;
      gap: 8px;
      justify-content: center; 
      align-items: center; 
      transition: all 0.2s ease; 
      backdrop-filter: blur(8px);
      z-index: 50;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    .close-btn:hover { 
      background: #ef4444; 
      border-color: #ef4444;
      transform: translateY(-2px);
      box-shadow: 0 15px 20px -3px rgba(239, 68, 68, 0.2);
    }
    .close-btn svg {
      width: 20px;
      height: 20px;
    }
    .loading {
      position: absolute;
      color: #94a3b8;
      font-size: 1.2rem;
      z-index: -1;
    }
  </style>
</head>
<body>
  <button class="close-btn" onclick="goBack()" title="العودة للملف">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    <span>العودة للملف</span>
  </button>
  <div class="loading">جاري تحميل الصورة...</div>
  <img id="image" src="" alt="" />

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const imgUrl = urlParams.get('url');
    const imageEl = document.getElementById('image');
    
    if (imgUrl) {
      imageEl.src = imgUrl;
      imageEl.onload = () => {
        document.querySelector('.loading').style.display = 'none';
      };
    } else {
      document.querySelector('.loading').textContent = 'لم يتم العثور على الصورة';
    }

    function goBack() {
      // If we have history, go back (useful when PDF is opened in the same tab)
      if (window.history.length > 1) {
        window.history.back();
      } else {
        // If opened in a new tab, close it
        window.close();
      }
    }
    
    // Add escape key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        goBack();
      }
    });
  </script>
</body>
</html>
