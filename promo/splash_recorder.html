<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITPC Splash Promo Recorder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #030510;
            font-family: 'Tajawal', sans-serif;
        }

        #canvas-container {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        #binary-canvas {
            position: absolute; inset: 0;
            z-index: 0;
        }

        .gradient-bg {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at center, rgba(10,36,99,0.6) 0%, transparent 70%);
            z-index: 1;
        }

        .content {
            position: relative; z-index: 10;
            text-align: center;
            display: flex; flex-direction: column;
            align-items: center;
        }

        .logo-container {
            position: relative;
            margin-bottom: 40px;
            opacity: 0; transform: scale(0);
            transition: all 2.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-container.show {
            opacity: 1; transform: scale(1.35);
        }

        .logo-img {
            max-width: 300px;
            filter: drop-shadow(0 0 50px rgba(34,197,94,0.4));
            animation: float 4.5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .text-group {
            color: white;
            opacity: 0; transform: translateY(30px);
            transition: all 1.5s ease-out;
        }

        .text-group.show {
            opacity: 1; transform: translateY(0);
        }

        .line {
            width: 0; height: 1px;
            background: linear-gradient(90deg, transparent, #10b981, transparent);
            margin: 20px auto;
            transition: width 1.8s ease-out;
        }

        .line.show { width: 280px; }

        .title-1 { font-size: 2rem; font-weight: 700; margin-bottom: 10px; }
        .title-2 { font-size: 1.5rem; font-weight: 600; opacity: 0.8; }
        
        .soon-badge {
            margin-top: 30px;
            padding: 15px 40px;
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid rgba(16, 185, 129, 0.5);
            border-radius: 15px;
            font-size: 2.5rem; font-weight: 900;
            backdrop-blur: 10px;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
            letter-spacing: 0.2em;
            opacity: 0; transform: scale(0.8);
            transition: all 2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .soon-badge.show { opacity: 1; transform: scale(1); }

        /* التحكم في المسجل */
        #recorder-ui {
            position: fixed; top: 20px; left: 20px;
            z-index: 9999;
            background: rgba(255,255,255,0.1);
            padding: 20px; border-radius: 15px;
            backdrop-blur: 10px; border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        button {
            background: #10b981; color: white;
            border: none; padding: 12px 25px;
            border-radius: 8px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #059669; transform: scale(1.05); }
        button:disabled { background: #374151; cursor: not-allowed; }

        #status { margin-top: 10px; font-size: 0.9rem; color: #10b981; }

        .glow-ring {
            position: absolute; border-radius: 50%;
            border: 2px solid rgba(34,197,94,0.3);
            opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="recorder-ui">
        <h3>مسجل فيديو الـ Splash</h3>
        <p>سيتم تسجيل 20 ثانية (فيديو + صوت)</p>
        <button id="startBtn">ابدأ التسجيل الآن</button>
        <div id="status">جاهز...</div>
    </div>

    <div id="canvas-container">
        <canvas id="binary-canvas"></canvas>
        <div class="gradient-bg"></div>
        
        <div class="content">
            <div id="logoBox" class="logo-container">
                <img src="../public/logo-new.png" class="logo-img" alt="Logo">
            </div>

            <div id="line" class="line"></div>
            
            <div id="text1" class="text-group title-1">وزارة الاتصالات</div>
            <div id="text2" class="text-group title-2">مديرية اتصالات ومعلوماتية كربلاء المقدسة</div>
            
            <div id="soon" class="soon-badge">قريبــــاً</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('binary-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ── المصفوفة الرقمية (Binary Rain) - ضبط السرعة حسب الزمن ──
        const columns = Math.floor(width / 25);
        // تبدأ من قيم سالبة لكي تنزل من الأعلى تدريجياً ولا تملأ الشاشة فوراً
        const drops = Array(columns).fill(0).map(() => -Math.random() * 40);
        const chars = "01";
        let lastTime = 0;

        function drawBinary(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            ctx.fillStyle = 'rgba(3, 5, 16, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            ctx.fillStyle = '#0ea5e9';
            ctx.font = '16px monospace';
            
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * 25, drops[i] * 25);
                
                if (drops[i] * 25 > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                // سرعة ثابتة بغض النظر عن قوة الجهاز
                drops[i] += 0.01 * (deltaTime || 16); 
            }
        }

        // ── النظام الصوتي (Web Audio API) ──
        let audioCtx;
        let streamDest;

        function createAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            streamDest = audioCtx.createMediaStreamDestination();

            function playNote(freq, start, duration, vol) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                gain.connect(streamDest);

                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + start);
                gain.gain.setValueAtTime(0, audioCtx.currentTime + start);
                gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + start + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + start + duration);

                osc.start(audioCtx.currentTime + start);
                osc.stop(audioCtx.currentTime + start + duration);
            }

            // موسيقى ترحيبية
            for(let i=0; i<15; i++) {
                playNote(220 * Math.pow(1.059, [0, 4, 7, 12, 16][i%5]), i * 1.5, 8, 0.1);
            }
        }

        // ── التسجيل ──
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        startBtn.onclick = async () => {
            try {
                startBtn.disabled = true;
                status.innerText = "جاري التحضير...";
                
                createAudio();
                lastTime = performance.now();

                // التحقق من أنواع الملفات المدعومة
                const types = [
                    'video/webm;codecs=vp8,opus',
                    'video/webm;codecs=vp9,opus',
                    'video/webm',
                    'video/mp4'
                ];
                let selectedType = types.find(t => MediaRecorder.isTypeSupported(t));

                const videoStream = canvas.captureStream(30); // 30 FPS كافية جداً ومستقرة
                const combinedStream = new MediaStream([
                    ...videoStream.getVideoTracks(),
                    ...streamDest.stream.getAudioTracks()
                ]);

                const recorder = new MediaRecorder(combinedStream, {
                    mimeType: selectedType,
                    videoBitsPerSecond: 5000000 // 5Mbps لجودة متوازنة
                });

                const chunks = [];
                recorder.ondataavailable = e => {
                    if (e.data.size > 0) chunks.push(e.data);
                };

                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: selectedType || 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `ITPC_Splash_Promo.${selectedType.includes('mp4') ? 'mp4' : 'webm'}`;
                    a.click();
                    status.innerText = "تم الحفظ! جرب تشغيله الآن.";
                    startBtn.disabled = false;
                };

                // انطلاق الأنيميشن
                setTimeout(() => document.getElementById('logoBox').classList.add('show'), 1000);
                setTimeout(() => document.getElementById('line').classList.add('show'), 2000);
                setTimeout(() => document.getElementById('text1').classList.add('show'), 3200);
                setTimeout(() => document.getElementById('text2').classList.add('show'), 4800);
                setTimeout(() => document.getElementById('soon').classList.add('show'), 6800);

                recorder.start(1000); // حفظ البيانات كل ثانية لضمان عدم الضياع
                status.innerText = "جاري التسجيل... يرجى الانتظار (20 ثانية)";

                function update(t) {
                    drawBinary(t);
                    if (recorder.state === 'recording') requestAnimationFrame(update);
                }
                requestAnimationFrame(update);

                setTimeout(() => {
                    recorder.stop();
                    status.innerText = "جاري معالجة الفيديو النهائي...";
                }, 21000);

            } catch (err) {
                console.error(err);
                status.innerText = "خطأ: " + err.message;
                startBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
