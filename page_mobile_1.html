        <div class="purview_view">
        <div class="purview_box">
            <div class="purview_imgBox">
                <img class="purview_img" src="//fliphtml5.com/images/accessdenied.png">
                <div class="purview_hintTitle">Access Denied</div>
                <div class="purview_hintContent">Bad Request</div>

    <script language="javascript" type="text/javascript">
        (function($) {
            $(function() {


                var purview_Login = $('.purview_Login');
                var purview_errorHintBox = $('.purview_errorHintBox');
                var authorizationID = $('.authorizationID');
                var bookId = "82315191";
                var purview_errorHint = $('.purview_errorHint');
                purview_Login.click(function() {
                    if (authorizationID.val().trim() != "") {
                        postdata(authorizationID.val().trim());
                    } else {
                        return false;
                    }
                })
                $(document).on("keydown", function(e) {
                    var value = authorizationID.val().trim();
                    if (e.keyCode === 13) {
                        if (value != "") {
                            postdata(value);
                        } else {
                            return false;
                        }
                    }
                });

                function postdata(value) {
                    $.ajax({ //调用jquery的ajax方法
                        type: "POST", //设置ajax方法提交数据的形式
                        dataType: 'json',
                        url: "/accessprocess/checkpurview.php",
                        data: "email=" + value + "&bookId=" + bookId, //输入框writer中的值作为提交的数据
                        beforeSend: function() {
                            purview_Login.text('Logging in...');
                        },
                        success: function(msg) { //提交成功后的回调，msg变量是ok.php输出的内容。
                            purview_Login.text('Login');
                            if (msg.status == '1') {

                                if (purview_errorHintBox.length > 0) {
                                    purview_errorHintBox.hide();
                                }

                                var ua = navigator.userAgent;
                                if ((ua.indexOf("Safari") > 0) && ua.indexOf("Chrome") == -1) {
                                    // if ( ( ua.indexOf("Safari") > 0 && ua.indexOf("Mobile") == -1 ) && ua.indexOf("Chrome") == -1  ) {
                                    // alert(1);
                                    // Safari custom domain iframe session lost fix

                                    try {
                                        window.parent.frames[0].postMessage({ // 兼容safari
                                            "messagetype": "RequestForUrl"
                                        }, "*");
                                    } catch (error) {
                                        window.parent.postMessage({
                                            "messagetype": "RequestForUrl"
                                        }, "*");
                                    }
                                    // window.parent.frames[0].postMessage({ // 兼容safari
                                    //     "messagetype": "RequestForUrl"
                                    // }, "*");

                                    window.addEventListener('message', function(event) {
                                        console.log(event.data, 'b');
                                        switch (event.data.messagetype) {
                                            case "PostUrl":
                                                var url = event.data.url;
                                                if (url.toLowerCase().indexOf('fliphtml5.com') == -1) {
                                                    try {
                                                        window.parent.frames[0].postMessage({
                                                            messagetype: "RequestForSession",
                                                            api: "https://fliphtml5.com/domain/loading.php?email=" + value + "&bookId=" + bookId + "&domain="
                                                        }, "*");
                                                    } catch (error) {
                                                        window.parent.postMessage({
                                                            messagetype: "RequestForSession",
                                                            api: "https://fliphtml5.com/domain/loading.php?email=" + value + "&bookId=" + bookId + "&domain="
                                                        }, "*");
                                                    }
                                                }
                                                break;
                                            default:
                                                                                                // window.location.href = "https://fliphtml5.com/read/Ker-ITPC/nlpz/index.html" + "?code=" + msg.code;
                                                break;
                                        };
                                    });


                                                                        window.location.href = "https://fliphtml5.com/read/Ker-ITPC/nlpz/index.html" + "?code=" + msg.code;


                                } else {
                                                                        window.location.href = "https://fliphtml5.com/read/Ker-ITPC/nlpz/index.html" + "?code=" + msg.code;
                                }

                            } else if (msg.status == '0') {
                                //Alert({message: 'Authorization failed!', title: 'Message', handler: setNameFocus});
                                purview_errorHintBox.show();
                                purview_errorHint.text('Authorization failed!');
                            } else if (msg.status == '2') {
                                //Alert({message: 'Authorization failed!', title: 'Message', handler: setNameFocus});
                                purview_errorHintBox.show();
                                purview_errorHint.text('Authorization failed!');
                            } else if (msg.status == '-1') {
                                //Alert({message: 'Bad Request!', title: 'Message', handler: setNameFocus});
                                purview_errorHintBox.show();
                                purview_errorHint.text('Bad Request!');
                            } else {
                                //Alert({message: 'Unexpected Error!', title: 'Message'});
                                purview_errorHintBox.show();
                                purview_errorHint.text('Unexpected Error!');
                            }
                        }
                    });
                }

                function setNameFocus() {
                    if ($("#phone-mail").width() === 0) $("#mail").focus();
                    else $("#phone-mail").focus();
                }

            })
        })($);
    </script>
