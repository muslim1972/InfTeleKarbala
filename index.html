<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />

  <meta name="google" content="notranslate">
  <link rel="icon" type="image/png" href="/icon-192.png?v=2" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script>
    /* System Integrity & Performance Monitor v2.1.0 */
    (function(){const h=window.location.hostname;if(h!=='localhost'&&h!=='127.0.0.1'){const n=()=>{};window.console.log=n;window.console.info=n;window.console.warn=n;window.console.error=n;window.console.debug=n;setTimeout(()=>console.clear(),1000);if(window.location.hash.includes('access_token=')){setTimeout(()=>{history.replaceState(null,document.title,window.location.pathname+window.location.search);},500);}}})();
  </script>
  <script>
    /* UI Layout Optimizer - Font & Scale Management */
    (function(){const m=document.querySelector('meta[name="viewport"]');if(m){m.content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,shrink-to-fit=no"}try{document.body.style.zoom="1.0"}catch(e){}})();
  </script>
  <title>مديرية اتصالات كربلاء</title>

  <script>
    /* Push Notification Engine & Service Connector */
    (function(){
      const isApp = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
      if (!isApp) {
        const s = document.createElement('script');
        s.src = "https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js";
        s.defer = true;
        document.head.appendChild(s);
        
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        window.OneSignalDeferred.push(function(O) {
          const h = window.location.hostname;
          if (h === 'localhost' || h === '127.0.0.1') return;
          O.init({
            appId: "beae0757-7abe-46a8-b223-8f6c65e47fb5",
            safari_web_id: "web.onesignal.auto.5a0e5a59-674b-4394-aabc-01283d58ef8a",
            notifyButton: { enable: false },
            allowLocalhostAsSecureOrigin: true
          }).catch(function(e) {});
        });
      }
    })();
  </script>


  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="اتصالات كربلاء" />
  <link rel="apple-touch-icon" href="/icon-192.png?v=2" />
  <link rel="manifest" href="/manifest.json?v=3" />
  <meta name="theme-color" content="#0f172a" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
