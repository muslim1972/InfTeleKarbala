<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate">
  <link rel="icon" type="image/png" href="/icon-192.png?v=2" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@300;400;500;700;900&family=Tajawal:wght@300;400;500;700;800;900&family=Poppins:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <title>مديرية اتصالات كربلاء</title>

  <!-- OneSignal SDK ensures init completes before App mounts -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function (OneSignal) {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        console.log('OneSignal: Initialized in debug mode on localhost');
        return;
      }
      
      try {
        await OneSignal.init({
          appId: "beae0757-7abe-46a8-b223-8f6c65e47fb5",
          safari_web_id: "web.onesignal.auto.5a0e5a59-674b-4394-aabc-01283d58ef8a",
          notifyButton: { enable: false }
        });
      } catch (e) { console.error("OneSignal Init Error:", e); }
    });
  </script>


  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="اتصالات كربلاء" />
  <link rel="apple-touch-icon" href="/icon-192.png?v=2" />
  <link rel="manifest" href="/manifest.json?v=3" />
  <meta name="theme-color" content="#0f172a" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
