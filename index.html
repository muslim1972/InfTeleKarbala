<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate">
  <link rel="icon" type="image/png" href="/icon-192.png?v=2" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@300;400;500;700;900&family=Tajawal:wght@300;400;500;700;800;900&family=Poppins:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <script>
    // الحماية النهائية للكونسول في بيئة الإنتاج
    (function() {
      const isProduction = window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1';
      if (isProduction) {
        // تعطيل كافة السجلات البرمجية
        const noop = () => {};
        window.console.log = noop;
        window.console.info = noop;
        window.console.warn = noop;
        window.console.error = noop;
        window.console.debug = noop;
        
        // تنظيف الكونسول من أي رسائل سابقة (مثل رسائل المتصفح أو الإضافات)
        setTimeout(() => {
          console.clear();
          // تكرار التنظيف لضمان إزالة أي رسائل تظهر لاحقاً أثناء التحميل
          setTimeout(() => console.clear(), 2000);
          setTimeout(() => console.clear(), 5000);
        }, 500);

        // تنظيف الرابط من التوكنات الحساسة (JWT) بعد تسجيل الدخول فوراً
        if (window.location.hash && window.location.hash.includes('access_token=')) {
          setTimeout(() => {
            history.replaceState(null, document.title, window.location.pathname + window.location.search);
          }, 500);
        }
      }
    })();
  </script>
  <script>
    // منع التكبير التلقائي ومنع تضخم الخطوط برمجياً في الأندرويد
    (function() {
      const meta = document.querySelector('meta[name="viewport"]');
      if (meta) {
        meta.content = "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no";
      }
      // تصفير أي زووم قد يقوم به النظام
      try {
        document.body.style.zoom = "1.0";
      } catch(e) {}
    })();
  </script>
  <title>مديرية اتصالات كربلاء</title>

  <script>
    // الحماية القصوى: منع تحميل Web SDK في نسخة الـ APK
    (function() {
      const isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
      if (!isNative) {
        const script = document.createElement('script');
        script.src = "https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js";
        script.defer = true;
        document.head.appendChild(script);

        window.OneSignalDeferred = window.OneSignalDeferred || [];
        window.OneSignalDeferred.push(async function (OneSignal) {
          const expectedHost = 'itpc-hr.vercel.app';
          const currentHost = window.location.hostname;
          
          if (currentHost === 'localhost' || currentHost === '127.0.0.1') return;
          
          if (currentHost !== expectedHost && currentHost !== 'itpc-hr.vercel.app') {
            // Mismatch detected - silent fail for production
          }

          try {
            await OneSignal.init({
              appId: "beae0757-7abe-46a8-b223-8f6c65e47fb5",
              safari_web_id: "web.onesignal.auto.5a0e5a59-674b-4394-aabc-01283d58ef8a",
              notifyButton: { enable: false },
              allowLocalhostAsSecureOrigin: true
            });
          } catch (e) { 
            // Silent error handling for OneSignal to keep console clean
          }
        });
      }
    })();
  </script>


  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="اتصالات كربلاء" />

  <link rel="manifest" href="/manifest.json?v=3" />
  <meta name="theme-color" content="#0f172a" />
</head>

</body>

</html>
